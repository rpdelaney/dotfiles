[tool.ruff]
target-version = "py313"

exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

[tool.ruff.lint]
select = [ "ALL" ]
ignore = [
    "COM812",   # formatter handles this
    "COM819",   # formatter handles this
    "ISC001",   # conflicts with the formatter
    "ISC002",   # conflicts with the formatter
    "ANN",      # ⚠️re-enable these checks in production code ⚠️
    "C",        # ⚠️re-enable these checks in production code ⚠️
    "D",        # ⚠️re-enable these checks in production code ⚠️
    "E501",     # ⚠️re-enable these checks in production code ⚠️
    "ERA",      # ⚠️re-enable these checks in production code ⚠️
    "FIX",      # ⚠️re-enable these checks in production code ⚠️
    "I001",     # ⚠️re-enable these checks in production code ⚠️
    "PERF",     # ⚠️re-enable these checks in production code ⚠️
    "PLR",      # ⚠️re-enable these checks in production code ⚠️
    "Q",        # ⚠️re-enable these checks in production code ⚠️
    "S",        # ⚠️re-enable these checks in production code ⚠️
    "T201",     # ⚠️re-enable these checks in production code ⚠️
    "TD",       # ⚠️re-enable these checks in production code ⚠️
]
fixable = [ "ALL" ]
unfixable = [
    "F401",
    # https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules {{{1
    "D206",
    "D300",
    "E111",
    "E114",
    "E117",
    "Q000",
    "Q001",
    "Q002",
    "Q003",
    "W191",
    # https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules 1}}}
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402"]
"**/{tests,docs}/*" = [
    "ARG",
    "ANN",
    "D",
    "S",
]

[tool.ruff.lint.isort]
# https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
force-single-line = false
force-wrap-aliases = false
lines-after-imports = 2
lines-between-types = 1
split-on-trailing-comma = false

[tool.ruff.lint.mccabe]
max-complexity = 5
